version: "3.8"

services:
  php:
    build: .
    volumes:
      - ./app:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tamalbank-user
      POSTGRES_PASSWORD: tamalbank-password
      POSTGRES_DB: tamalbank-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest:latest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://admin:adminpassword@db:5432/tamalbank-db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: admin
    depends_on:
      - db

volumes:
  db_data:
