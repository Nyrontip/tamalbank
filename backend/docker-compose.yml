services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tamalbank-user
      POSTGRES_PASSWORD: tamalbank-password
      POSTGRES_DB: tamalbank-db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_network

  php:
    build: .
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=tamalbank-db
      - DB_USER=tamalbank-user
      - DB_PASS=tamalbank-password
      - BANK_API_URL=http://host.docker.internal:8083
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    networks:
      - backend_network

  nginx:
    image: nginx:latest
    ports:
      - "8084:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - php
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  db_data: